<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Tasks </title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

<h1 class="text-4xl font-bold text-center mb-8">
  DOM Tasks 
</h1>

<div class="grid md:grid-cols-2 gap-6">

    <!-- ================= Task 1 ================= -->

    <div class="bg-white p-5 rounded-lg shadow">

        <h2 class="text-xl font-bold mb-4">
            Task 1 - Character Counter
        </h2>

        <textarea
            id="text"
            oninput="countCharacter()"
            class="border w-full p-2 rounded"
            rows="5"
            placeholder="Type here..."></textarea>

        <h3
            id="charResult"
            class="mt-3 font-bold">
            Total Characters : 0
        </h3>

    </div>

    <!-- ================= Task 2 ================= -->

    <div class="bg-white p-5 rounded-lg shadow">

        <h2 class="text-xl font-bold mb-4">
            Task 2 - Age Category
        </h2>

        <input
            id="age"
            type="number"
            placeholder="Enter Age"
            class="border p-2 rounded w-full">

        <button
            onclick="checkAge()"
            class="bg-blue-500 text-white px-5 py-2 rounded mt-3">
            Check
        </button>

        <h3
            id="ageResult"
            class="mt-3 font-bold"></h3>

    </div>

    <!-- ================= Task 3 ================= -->

    <div class="bg-white p-5 rounded-lg shadow">

        <h2 class="text-xl font-bold mb-4">
            Task 3 - Dark / Light Mode
        </h2>

        <button
            onclick="changeMode()"
            class="bg-black text-white px-5 py-2 rounded">
            Toggle Mode
        </button>

    </div>

    <!-- ================= Task 4 ================= -->

    <div class="bg-white p-5 rounded-lg shadow">

        <h2 class="text-xl font-bold mb-4">
            Task 4 - Movie Ticket Calculator
        </h2>

        <input
            id="ticket"
            type="number"
            placeholder="Number of Tickets"
            class="border p-2 rounded w-full">

        <button
            onclick="calculateTicket()"
            class="bg-green-500 text-white px-5 py-2 rounded mt-3">
            Calculate
        </button>

        <h3
            id="ticketResult"
            class="mt-3 font-bold"></h3>

    </div>

    <!-- ================= Task 5 ================= -->

    <div class="bg-white p-5 rounded-lg shadow md:col-span-2">

        <h2 class="text-xl font-bold mb-4">
            Task 5 - Profile Card Generator
        </h2>

        <input
            id="name"
            type="text"
            placeholder="Enter Name"
            class="border p-2 rounded w-full mb-3">

        <input
            id="role"
            type="text"
            placeholder="Enter Role"
            class="border p-2 rounded w-full mb-3">

        <input
            id="company"
            type="text"
            placeholder="Enter Company"
            class="border p-2 rounded w-full">

        <button
            onclick="generateCard()"
            class="bg-purple-500 text-white px-5 py-2 rounded mt-3">
            Generate Card
        </button>

        <div
            id="profileCard"
            class="mt-5"></div>

    </div>

</div>

<script>

// ================= Task 1 =================

function countCharacter(){

    let text = document.getElementById("text").value;

    document.getElementById("charResult").innerText =
    "Total Characters : " + text.length;

}

// ================= Task 2 =================

function checkAge(){

    let age = Number(document.getElementById("age").value);

    if(age <= 12){

        ageResult.innerText = "Child";

    }

    else if(age <= 19){

        ageResult.innerText = "Teenager";

    }

    else if(age <= 59){

        ageResult.innerText = "Adult";

    }

    else{

        ageResult.innerText = "Senior Citizen";

    }

}

// ================= Task 3 =================

let dark = false;

function changeMode(){

    if(dark == false){

        document.body.classList.remove("bg-gray-100");
        document.body.classList.add("bg-black","text-white");

        dark = true;

    }

    else{

        document.body.classList.remove("bg-black","text-white");
        document.body.classList.add("bg-gray-100");

        dark = false;

    }

}

// ================= Task 4 =================

function calculateTicket(){

    let ticket = Number(document.getElementById("ticket").value);

    let total = ticket * 150;

    ticketResult.innerText =
    "Total Amount : ₹" + total;

}

// ================= Task 5 =================

function generateCard(){

    let name = document.getElementById("name").value;

    let role = document.getElementById("role").value;

    let company = document.getElementById("company").value;

    profileCard.innerHTML = `

    <div class="border rounded-lg p-5 shadow bg-white text-black">

        <h2 class="text-2xl font-bold">${name}</h2>

        <p class="mt-2">Role : ${role}</p>

        <p>Company : ${company}</p>

    </div>

    `;

}



</script>

</body>
</html>
