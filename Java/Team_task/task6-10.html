<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Tasks 6 - 10</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

<h1 class="text-4xl font-bold text-center mb-8">
    DOM Tasks 6 - 10
</h1>

<div class="grid md:grid-cols-2 gap-6">

    <!-- ================= Task 6 ================= -->

    <div class="bg-white p-5 rounded-lg shadow">

        <h2 class="text-xl font-bold mb-4">
            Task 6 - Search Hero
        </h2>

        <input
            id="hero"
            type="text"
            placeholder="Enter Hero Name"
            class="border p-2 rounded w-full">

        <button
            onclick="searchHero()"
            class="bg-blue-500 text-white px-5 py-2 rounded mt-3">
            Search
        </button>

        <h3
            id="heroResult"
            class="mt-3 font-bold"></h3>

    </div>

    <!-- ================= Task 7 ================= -->

    <div class="bg-white p-5 rounded-lg shadow">

        <h2 class="text-xl font-bold mb-4">
            Task 7 - Lucky Number
        </h2>

        <input
            id="number"
            type="number"
            placeholder="Enter Number"
            class="border p-2 rounded w-full">

        <button
            onclick="checkLucky()"
            class="bg-green-500 text-white px-5 py-2 rounded mt-3">
            Check
        </button>

        <h3
            id="luckyResult"
            class="mt-3 font-bold"></h3>

    </div>

    <!-- ================= Task 8 ================= -->

    <div class="bg-white p-5 rounded-lg shadow">

        <h2 class="text-xl font-bold mb-4">
            Task 8 - Product Price Calculator
        </h2>

        <input
            id="product"
            type="text"
            placeholder="Product Name"
            class="border p-2 rounded w-full mb-3">

        <input
            id="quantity"
            type="number"
            placeholder="Quantity"
            class="border p-2 rounded w-full mb-3">

        <input
            id="price"
            type="number"
            placeholder="Price"
            class="border p-2 rounded w-full">

        <button
            onclick="calculatePrice()"
            class="bg-purple-500 text-white px-5 py-2 rounded mt-3">
            Calculate
        </button>

        <h3
            id="priceResult"
            class="mt-3 font-bold"></h3>

    </div>

    <!-- ================= Task 9 ================= -->

    <div class="bg-white p-5 rounded-lg shadow">

        <h2 class="text-xl font-bold mb-4">
            Task 9 - Random Quote
        </h2>

        <button
            onclick="randomQuote()"
            class="bg-red-500 text-white px-5 py-2 rounded">
            Generate Quote
        </button>

        <h3
            id="quoteResult"
            class="mt-5 text-lg font-semibold"></h3>

    </div>

    <!-- ================= Task 10 ================= -->

    <div class="bg-white p-5 rounded-lg shadow md:col-span-2">

        <h2 class="text-xl font-bold mb-4">
            Task 10 - Student ID Generator
        </h2>

        <input
            id="studentName"
            type="text"
            placeholder="Student Name"
            class="border p-2 rounded w-full mb-3">

        <input
            id="course"
            type="text"
            placeholder="Course"
            class="border p-2 rounded w-full">

        <button
            onclick="generateStudent()"
            class="bg-indigo-500 text-white px-5 py-2 rounded mt-3">
            Generate
        </button>

        <div
            id="studentCard"
            class="mt-5"></div>

    </div>

</div>

<script>

// ================= Task 6 =================

let heroes = [
    "Vijay",
    "Ajith",
    "Suriya",
    "SK",
    "Dhanush"
];

function searchHero(){

    let hero = document.getElementById("hero").value;

    if(heroes.includes(hero)){
        heroResult.innerText = "Found";
    }
    else{
        heroResult.innerText = "Not Found";
    }

}

// ================= Task 7 =================

function checkLucky(){

    let number = Number(document.getElementById("number").value);

    if(number==7 || number==14 || number==21 || number==28){

        luckyResult.innerText = "Lucky Number";

    }

    else{

        luckyResult.innerText = "Normal Number";

    }

}

// ================= Task 8 =================

function calculatePrice(){

    let product = document.getElementById("product").value;

    let quantity = Number(document.getElementById("quantity").value);

    let price = Number(document.getElementById("price").value);

    let total = quantity * price;

    priceResult.innerHTML = `

    Product : ${product}<br>

    Quantity : ${quantity}<br>

    Total : ₹${total}

    `;

}

// ================= Task 9 =================

let quotes = [

    "Never Give Up",

    "Dream Big",

    "Stay Positive",

    "Success Needs Hard Work",

    "Keep Learning"

];

function randomQuote(){

    let random = Math.floor(Math.random()*quotes.length);

    quoteResult.innerText = quotes[random];

}

// ================= Task 10 =================

let id = 1001;

function generateStudent(){

    let name = document.getElementById("studentName").value;

    let course = document.getElementById("course").value;

    studentCard.innerHTML = `

    <div class="border rounded-lg p-5 shadow bg-white">

        <h2 class="text-2xl font-bold">${name}</h2>

        <p class="mt-2">Course : ${course}</p>

        <p>ID : STU${id}</p>

    </div>

    `;

    id++;

}

</script>

</body>
</html>
