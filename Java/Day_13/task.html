<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Toggle </title>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-100">

  <!-- Button -->
  <button
    id="toggleBtn"
    class="px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 mb-6"
  >
    Hide Box
  </button>

  <!-- Big Box -->
  <div
    id="box"
    class="w-96 h-96 bg-green-500 rounded-xl flex items-center justify-center text-white text-4xl font-bold transition-all duration-500 ease-in-out opacity-100 scale-100"
  >
    BOX
  </div>

  <script>
    let btn = document.getElementById("toggleBtn");
    let box = document.getElementById("box");

    btn.addEventListener("click", () => {
      if (box.classList.contains("opacity-0")) {
        box.classList.remove("opacity-0", "scale-0");
        box.classList.add("opacity-100", "scale-100");
        btn.innerText = "Hide Box";
      } else {
        box.classList.remove("opacity-100", "scale-100");
        box.classList.add("opacity-0", "scale-0");
        btn.innerText = "Show Box";
      }
    });
  </script>

</body>
</html>
