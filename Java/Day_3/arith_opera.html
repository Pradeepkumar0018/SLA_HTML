<script>

// Arithmetic Operators
let valueA = 10;
let valueB = 20;
console.log("valueA + valueB =", valueA + valueB); // Addition
console.log("valueA - valueB =", valueA - valueB); // Subtraction
console.log("valueA * valueB =", valueA * valueB); // Multiplication
console.log("valueA / valueB =", valueA / valueB); // Division
console.log("valueA % valueB =", valueA % valueB); // Modulus

let value1 = 30;
let value2 = 40;
value1 += value2; // value1 = value1 + value2
console.log("value1 =", value1); // 70
value1 -= value2; // value1 = value1 - value2
console.log("value1 =", value1); // 30

</script>
