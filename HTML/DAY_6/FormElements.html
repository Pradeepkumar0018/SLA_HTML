<html>
    <head>
        <title>Avengers Recruitment Form</title>
    </head>

    <body bgcolor="white" text="Black">

        <section>
            <div>
                <center>

                    <h1>🛡️ Avengers Recruitment Form</h1>
                    <h3>Apply to Join Tony Stark's Team</h3>

                    <form method="post">

                        <label>Enter Your Hero Name</label>
                        <br/>
                        <input type="text" placeholder="Enter Hero Name" required />
                        <br/><br/>

                        <label>Enter Your Age</label>
                        <br/>
                        <input type="number" min="18" max="60" placeholder="Enter Your Age" required />
                        <br/><br/>

                        <label>Enter Your Mobile Number</label>
                        <br/>
                        <input type="tel" minlength="10" maxlength="10" placeholder="Enter Mobile Number" required />
                        <br/><br/>

                        <label>Enter Your Email</label>
                        <br/>
                        <input type="email" placeholder="Enter Your Email" required />
                        <br/><br/>

                        <label>Create Avengers Password</label>
                        <br/>
                        <input type="password" placeholder="Create Password" required />
                        <br/><br/>

                        <label>Select Your Gender</label>
                        <br/>

                        <input type="radio" name="gender" required /> Male
                        <input type="radio" name="gender" /> Female
                        <input type="radio" name="gender" /> Other

                        <br/><br/>

                        <label>Select Your Super Skills</label>
                        <br/>

                        <input type="checkbox" /> Super Strength
                        <input type="checkbox" /> Technology
                        <input type="checkbox" /> Flying
                        <input type="checkbox" /> Martial Arts
                        <input type="checkbox" /> AI Knowledge

                        <br/><br/>

                        <label>Select Power Level</label>
                        <br/>
                        <input type="range" min="1" max="100" />

                        <br/><br/>

                        <label>Select Your Suit Color</label>
                        <br/>
                        <input type="color" />

                        <br/><br/>

                        <label>Select Date of Joining</label>
                        <br/>
                        <input type="date" />

                        <br/><br/>

                        <label>Select Available Time</label>
                        <br/>
                        <input type="time" />

                        <br/><br/>

                        <label>Upload Your Hero Photo</label>
                        <br/>
                        <input type="file" />

                        <br/><br/>

                        <label>Choose Your Favorite Avenger</label>
                        <br/>

                        <select>
                            <option>Iron Man</option>
                            <option>Captain America</option>
                            <option>Thor</option>
                            <option>Hulk</option>
                            <option>Spider Man</option>
                            <option>Black Widow</option>
                        </select>

                        <br/><br/>

                        <label>Select Your Avengers Branch</label>
                        <br/>

                        <select>
                            <option>Tech Team</option>
                            <option>Battle Team</option>
                            <option>Space Team</option>
                            <option>Research Team</option>
                        </select>

                        <br/><br/>

                        <label>Enter Your Experience</label>
                        <br/>
                        <textarea rows="4" cols="40" placeholder="Describe your superhero experience"></textarea>

                        <br/><br/>

                        <label>Accept Avengers Rules</label>
                        <br/>

                        <input type="checkbox" required /> I Agree to Protect Earth 🌍

                        <br/><br/>

                        <input type="submit" value="Join Avengers Team" />

                        <input type="reset" value="Clear Form" />

                    </form>

                </center>
            </div>
        </section>

    </body>
</html>
