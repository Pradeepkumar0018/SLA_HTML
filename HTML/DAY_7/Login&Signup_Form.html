<html>

<head>
    <title>Login and Signup Form</title>
</head>

<body>

    <section>
        <div>
            <center>
                <h1>Login Form</h1>

                <form>
                    <div>
                        <label>Email:</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <br>

                    <div>
                        <label>Password:</label>
                        <input type="password" placeholder="Enter password" required minlength="6" maxlength="12">
                    </div>
                    <br>

                    <div>
                        <input type="submit" value="Login">
                    </div>
                </form>

                <hr>

                <h1>Signup Form</h1>

                <form>
                    <div>
                        <label>Full Name:</label>
                        <input type="text" placeholder="Enter your full name" required minlength="3" maxlength="20">
                    </div>
                    <br>

                    <div>
                        <label>Email:</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <br>

                    <div>
                        <label>Phone Number:</label>
                        <input type="tel" placeholder="Enter 10-digit phone number" required minlength="10" maxlength="10">
                    </div>
                    <br>

                    <div>
                        <label>Password:</label>
                        <input type="password" placeholder="Create password" required minlength="6" maxlength="12">
                    </div>
                    <br>

                    <div>
                        <label>Confirm Password:</label>
                        <input type="password" placeholder="Confirm password" required minlength="6" maxlength="12">
                    </div>
                    <br>

                    <div>
                        <input type="submit" value="Signup">
                    </div>
                </form>

            </center>
        </div>
    </section>

</body>

</html>
