<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Inside Box</title>
    <link rel="stylesheet" href="../assets/CSS/boxwithbox.css">
</head>
<body>

    <!-- Outer Box -->
    <div class="outer-box">

        <h2>Outer Box</h2>

        <p>
            This is the parent box.
            It contains another box inside it.
        </p>

        <!-- Inner Box -->
        <div class="inner-box">

            <h3>Inner Box</h3>

            <p>
                This is the child box inside the parent box.
            </p>

        </div>

    </div>

</body>
</html>
