<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail Card</title>

    <link rel="stylesheet" href="../assets/CSS/card.css">
</head>

<body>

    <div class="outer-box">

        <h2>Thumbnail</h2>

        <div class="content">

            <!-- Image Box -->
            <div class="image-box">
                <img src="../assets/Logos/Screenshot (26).png" alt="thumbnail">
            </div>

            <!-- Text Content -->
            <div class="text-box">

                <p>
                    <strong>Note:</strong> This image tile will be used to represent this course across all your academy's landing pages.
                </p>

                <p>
                    Allowed formats:
                    ".jpg, .png, .jpeg, .gif, .webp, .sketch"
                </p>

                <p>
                    Preferred minimum resolution: 480 × 270
                </p>

                <p>
                    Maximum size: 150kb
                </p>

                <button>Add Image</button>

            </div>

        </div>

    </div>

</body>
</html>
