<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCB Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">

    <div class="bg-white shadow-lg rounded-lg p-5 w-80">
        
        <img
            src="../Assets/imgs/rcb.png"
            alt="RCB Team"
            class="w-full h-48 object-cover rounded-lg"
        >

        <h2 class="text-2xl font-bold mt-4 text-red-600">
            Royal Challengers Bengaluru
        </h2>

        <p class="text-gray-600 mt-2">
            Royal Challengers Bengaluru (RCB) is one of the most popular teams
            in the Indian Premier League (IPL). Known for its passionate fanbase
            and star players, RCB represents Bengaluru and plays its home matches
            at the M. Chinnaswamy Stadium.
        </p>

        <button class="bg-red-600 text-white px-4 py-2 rounded-lg mt-4 hover:bg-red-700">
            View Team
        </button>

    </div>

</body>
</html>
